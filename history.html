<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出席完了・履歴</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 550px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 28px; color: #2ecc71; margin-bottom: 10px; }
        .success-icon { font-size: 48px; color: #2ecc71; margin-bottom: 15px; }
        p { font-size: 16px; color: #4a5568; }
        
        /* 教科切り替えボタンのスタイル */
        .filter-group { display: flex; justify-content: space-between; gap: 5px; margin-top: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-filter { flex: 1; min-width: 80px; padding: 8px 5px; font-size: 12px; font-weight: bold; background-color: #edf2f7; color: #4a5568; border: 1px solid #cbd5e0; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-filter:hover { background-color: #e2e8f0; }
        .btn-filter.active { background-color: #2ecc71; color: white; border-color: #2ecc71; }

        /* === 追加：集計ボックスのスタイル === */
        .summary-box { display: flex; justify-content: space-around; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 20px; }
        .summary-item { text-align: center; }
        .summary-label { font-size: 12px; color: #718096; margin-bottom: 4px; font-weight: bold; }
        .summary-count { font-size: 20px; font-weight: bold; }
        .count-present { color: #2ecc71; }
        .count-late { color: #f1c40f; }

        /* 出席状況の表のスタイル */
        .history-section { margin-top: 15px; text-align: left; }
        .history-section h2 { font-size: 18px; color: #2c3e50; border-left: 5px solid #2ecc71; padding-left: 10px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 14px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        th { background-color: #f7fafc; color: #4a5568; font-weight: bold; }
        tr:hover { background-color: #f8fafc; }
        .no-data { text-align: center; color: #a0aec0; padding: 20px; font-style: italic; }

        /* 状態（出席・遅刻）のバッジ風デザイン */
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-present { background-color: #e8f8f5; color: #2ecc71; }
        .status-late { background-color: #fef9e7; color: #f1c40f; }

        .btn-back { display: block; width: 100%; padding: 12px; font-size: 16px; font-weight: bold; color: white; background-color: #3498db; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; margin-top: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logout { margin-top: 30px; display: inline-block; color: #7f8c8d; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="success-icon">✓</div>
    <h1>出席登録が完了しました！</h1>
    <p>現在の出席状況は以下の通りです。</p>

    <div class="filter-group">
        <button class="btn-filter active" onclick="filterSubject('all')">すべて</button>
        <button class="btn-filter" onclick="filterSubject('信号処理')">信号処理</button>
        <button class="btn-filter" onclick="filterSubject('システム設計1')">システム設計1</button>
        <button class="btn-filter" onclick="filterSubject('力学')">力学</button>
    </div>

    <div class="summary-box">
        <div class="summary-item">
            <div class="summary-label">出席回数</div>
            <div id="presentCount" class="summary-count count-present">0 回</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">遅刻回数</div>
            <div id="lateCount" class="summary-count count-late">0 回</div>
        </div>
    </div>

    <div class="history-section">
        <h2 id="historyTitle">あなたの出席履歴（すべて）</h2>
        <table>
            <thead>
                <tr>
                    <th>教科名</th>
                    <th>状態</th>
                    <th>出席日時</th>
                </tr>
            </thead>
            <tbody id="historyTableBody">
                <tr>
                    <td colspan="3" class="no-data">読み込み中...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <a href="./attendance.html" class="btn-back">出席画面に戻る</a>
    <br>
    <a href="./index.html" class="logout">ログアウトしてトップへ</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
    authDomain: "attendance-system-4194f.firebaseapp.com",
    projectId: "attendance-system-4194f",
    storageBucket: "attendance-system-4194f.firebasestorage.app",
    messagingSenderId: "775610185044",
    appId: "1:775610185044:web:e2b101da1258dc5b4ac4c1",
    measurementId: "G-4Y27410MKM"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const studentId = localStorage.getItem('studentId');

  let allAttendanceData = [];

  if (!studentId) {
      window.location.href = './index.html';
  } else {
      loadAttendanceHistory();
  }

  async function loadAttendanceHistory() {
    const tableBody = document.getElementById('historyTableBody');
    try {
      const q = query(
        collection(db, "attendances"),
        where("studentId", "==", studentId)
      );
      
      const querySnapshot = await getDocs(q);
      allAttendanceData = [];

      querySnapshot.forEach((doc) => {
        allAttendanceData.push(doc.data());
      });

      // 新しい順にソート
      allAttendanceData.sort((a, b) => {
        const timeA = a.timestamp ? a.timestamp.toDate().getTime() : 0;
        const timeB = b.timestamp ? b.timestamp.toDate().getTime() : 0;
        return timeB - timeA;
      });

      // 最初の表示（すべて）
      displayData(allAttendanceData);

    } catch (error) {
      console.error(error);
      tableBody.innerHTML = `<tr><td colspan="3" class="no-data" style="color:red;">履歴の読み込みに失敗しました</td></tr>`;
    }
  }

  // 画面にデータを表示＋回数を集計する関数
  window.displayData = function(dataList) {
    const tableBody = document.getElementById('historyTableBody');
    tableBody.innerHTML = ""; 

    // ★追加：出席と遅刻のカウント用変数
    let presentCount = 0;
    let lateCount = 0;

    if (dataList.length === 0) {
      tableBody.innerHTML = `<tr><td colspan="3" class="no-data">対象の出席履歴はありません</td></tr>`;
      document.getElementById('presentCount').innerText = "0 回";
      document.getElementById('lateCount').innerText = "0 回";
      return;
    }

    dataList.forEach((data) => {
      let timeString = "日時データなし";
      if (data.timestamp) {
          const date = data.timestamp.toDate();
          const year = date.getFullYear();
          const month = String(date.getMonth() + 1).padStart(2, '0');
          const day = String(date.getDate()).padStart(2, '0');
          const hours = String(date.getHours()).padStart(2, '0');
          const minutes = String(date.getMinutes()).padStart(2, '0');
          timeString = `${year}/${month}/${day} ${hours}:${minutes}`;
      }

      // 状態の判定とカウントの加算
      const statusValue = data.status || "出席"; 
      let statusHtml = "";
      if (statusValue === "遅刻") {
          statusHtml = `<span class="status-badge status-late">遅刻 (△)</span>`;
          lateCount++; // 遅刻を1プラス
      } else {
          statusHtml = `<span class="status-badge status-present">出席 (〇)</span>`;
          presentCount++; // 出席を1プラス
      }

      const row = document.createElement('tr');
      row.innerHTML = `
          <td>${data.subject}</td>
          <td>${statusHtml}</td>
          <td>${timeString}</td>
      `;
      tableBody.appendChild(row);
    });

    // ★追加：集計した数字を画面に反映させる
    document.getElementById('presentCount').innerText = `${presentCount} 回`;
    document.getElementById('lateCount').innerText = `${lateCount} 回`;
  }

  window.filterSubject = function(subjectName) {
    const buttons = document.querySelectorAll('.btn-filter');
    buttons.forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    const titleEl = document.getElementById('historyTitle');

    if (subjectName === 'all') {
        titleEl.innerText = "あなたの出席履歴（すべて）";
        displayData(allAttendanceData);
    } else {
        titleEl.innerText = `あなたの出席履歴（${subjectName}）`;
        const filtered = allAttendanceData.filter(item => item.subject === subjectName);
        displayData(filtered); // フィルターされたリストを渡すと自動でその教科だけのカウントになる
    }
  }
</script>
</body>
</html>
