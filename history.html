<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出席完了・履歴</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 550px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 28px; color: #2ecc71; margin-bottom: 10px; }
        .success-icon { font-size: 48px; color: #2ecc71; margin-bottom: 15px; }
        p { font-size: 16px; color: #4a5568; }

        .summary-box { display: flex; justify-content: space-around; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 20px; }
        .summary-item { text-align: center; }
        .summary-label { font-size: 12px; color: #718096; margin-bottom: 4px; font-weight: bold; }
        .summary-count { font-size: 20px; font-weight: bold; }
        .count-present { color: #2ecc71; }
        .count-late { color: #f1c40f; }

        .history-section { margin-top: 15px; text-align: left; }
        .history-section h2 { font-size: 18px; color: #2c3e50; border-left: 5px solid #2ecc71; padding-left: 10px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 14px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        th { background-color: #f7fafc; color: #4a5568; font-weight: bold; }
        tr:hover { background-color: #f8fafc; }
        .no-data { text-align: center; color: #a0aec0; padding: 20px; font-style: italic; }

        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-present { background-color: #e8f8f5; color: #2ecc71; }
        .status-late { background-color: #fef9e7; color: #f1c40f; }

        .btn-back { display: block; width: 100%; padding: 12px; font-size: 16px; font-weight: bold; color: white; background-color: #3498db; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; margin-top: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logout { margin-top: 30px; display: inline-block; color: #7f8c8d; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="success-icon">✓</div>
    <h1>出席登録が完了しました！</h1>
    <p id="subjectTitle">授業名を読み込み中...</p>

    <div class="summary-box">
        <div class="summary-item">
            <div class="summary-label">出席回数</div>
            <div id="presentCount" class="summary-count count-present">0 回</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">遅刻回数</div>
            <div id="lateCount" class="summary-count count-late">0 回</div>
        </div>
    </div>

    <div class="history-section">
        <h2>あなたの出席履歴</h2>
        <table>
            <thead>
                <tr>
                    <th>状態</th>
                    <th>出席日時</th>
                </tr>
            </thead>
            <tbody id="historyTableBody">
                <tr><td colspan="2" class="no-data">読み込み中...</td></tr>
            </tbody>
        </table>
    </div>

    <a id="backBtn" class="btn-back">出席画面に戻る</a>
    <br>
    <a href="./index.html" class="logout">ログアウトしてトップへ</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
        authDomain: "attendance-system-4194f.firebaseapp.com",
        projectId: "attendance-system-4194f",
        storageBucket: "attendance-system-4194f.firebasestorage.app",
        messagingSenderId: "775610185044",
        appId: "1:775610185044:web:e2b101da1258dc5b4ac4c1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(location.search);
    const classId = params.get('classId');

    const studentId = localStorage.getItem('studentId');

    if (!studentId || !classId) {
        alert("情報が不足しています。最初からやり直してください。");
        window.location.href = "./index.html";
    }

    document.getElementById("backBtn").href = `./attendance.html?classId=${classId}`;

    async function loadHistory() {
        const subjectTitle = document.getElementById("subjectTitle");

        // 授業名取得
        const classSnap = await getDoc(doc(db, "attendance", classId));
        const subject = classSnap.exists() ? classSnap.data().subject : "授業名なし";
        subjectTitle.innerText = subject;

        const tableBody = document.getElementById("historyTableBody");

        const snap = await getDocs(collection(db, `attendance/${classId}/students`));

        let presentCount = 0;
        let lateCount = 0;

        const rows = [];

        snap.forEach(docSnap => {
            const data = docSnap.data();
            if (data.studentId !== studentId) return;

            const time = data.timestamp?.toDate();
            const timeStr = time
                ? `${time.getFullYear()}/${String(time.getMonth()+1).padStart(2,"0")}/${String(time.getDate()).padStart(2,"0")} ${String(time.getHours()).padStart(2,"0")}:${String(time.getMinutes()).padStart(2,"0")}`
                : "日時なし";

            const status = data.status || "出席";

            if (status === "遅刻") lateCount++;
            else presentCount++;

            rows.push(`
                <tr>
                    <td>
                        ${status === "遅刻"
                            ? `<span class="status-badge status-late">遅刻 (△)</span>`
                            : `<span class="status-badge status-present">出席 (〇)</span>`
                        }
                    </td>
                    <td>${timeStr}</td>
                </tr>
            `);
        });

        document.getElementById("presentCount").innerText = `${presentCount} 回`;
        document.getElementById("lateCount").innerText = `${lateCount} 回`;

        if (rows.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="2" class="no-data">履歴がありません</td></tr>`;
        } else {
            tableBody.innerHTML = rows.join("");
        }
    }

    loadHistory();
</script>

</body>
</html>
