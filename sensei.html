<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>先生用管理画面</title>
<style>
  body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; color: #333; }
  h1 { color: #2c3e50; }
  .controls { margin-bottom: 20px; display: flex; gap: 15px; align-items: center; }
  select, button { padding: 8px 12px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; }
  button { background-color: #3498db; color: white; cursor: pointer; border: none; font-weight: bold; }
  button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
  th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
  th { background-color: #f2f2f2; }
</style>
</head><body>

<h1>出席一覧</h1>

<div class="controls">
  <label for="subjectFilter">教科で絞り込み:</label>
  <select id="subjectFilter">
    <option value="all">すべて表示</option>
    <option value="信号処理">信号処理</option>
    <option value="システム設計1">システム設計1</option>
    <option value="力学">力学</option>
  </select>

  <button id="csvBtn" disabled>CSVダウンロード</button>
</div>

<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>名前</th>
      <th>教科</th>
      <th>状態</th>
      <th>日時</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",authDomain:"attendance-system-4194f.firebaseapp.com",projectId:"attendance-system-4194f",storageBucket:"attendance-system-4194f.firebasestorage.app",messagingSenderId:"775610185044",appId:"1:775610185044:web:e2b101da1258dc5b4ac4c1"};
const app=initializeApp(firebaseConfig); const db=getFirestore(app);

// 1. 全データを一旦Firestoreから取得して保持する
const snap=await getDocs(query(collection(db,'attendances'),orderBy('timestamp','desc')));
const tb=document.getElementById('list');
const subjectFilter = document.getElementById('subjectFilter');

const allRows=[];

// データの整形
snap.forEach(d=>{
 const x=d.data();
 const timeStr = x.timestamp?.toDate ? x.timestamp.toDate().toLocaleString() : '';
 
 // attendance.html側で name 属性で保存されているので x.name || x.studentName のように両方ケア
 allRows.push({
  id: x.studentId || '',
  name: x.name || x.studentName || '', 
  subject: x.subject || '未設定',
  status: x.status || '出席',
  time: timeStr
 });
});

// 2. 画面表示を更新する関数（絞り込み対応）
function updateTable() {
  const selectedSubject = subjectFilter.value;
  tb.innerHTML = ''; // テーブルを一旦クリア

  // 選択された教科でフィルタリング（'all' ならすべて）
  const filteredRows = allRows.filter(r => selectedSubject === 'all' || r.subject === selectedSubject);

  filteredRows.forEach(r => {
    tb.innerHTML += `<tr>
      <td>${r.id}</td>
      <td>${r.name}</td>
      <td>${r.subject}</td>
      <td>${r.status}</td>
      <td>${r.time}</td>
    </tr>`;
  });
}

// 初期表示
updateTable();
document.getElementById('csvBtn').disabled=false;

// 3. プルダウンが変更されたらテーブルを再描画
subjectFilter.addEventListener('change', updateTable);

// 4. CSVダウンロード（現在表示されている教科のデータのみを出力）
document.getElementById('csvBtn').addEventListener('click',()=>{
 const selectedSubject = subjectFilter.value;
 // 現在表示されているデータだけをCSVにする
 const filteredRows = allRows.filter(r => selectedSubject === 'all' || r.subject === selectedSubject);

 // ヘッダーに「教科」と「状態」を追加
 let csv='\uFEFFID,名前,教科,出席状況,日時\n';
 filteredRows.forEach(r=>{
  csv+=[r.id, r.name, r.subject, r.status, r.time].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')+'\n';
 });

 const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
 const url=URL.createObjectURL(blob);
 const a=document.createElement('a');
 a.href=url;
 
 // ファイル名に教科名を入れる（「すべて」の場合は空欄か全体）
 const subjectLabel = selectedSubject === 'all' ? '全教科' : selectedSubject;
 a.download=`出席データ_${subjectLabel}_${new Date().toISOString().split('T')[0]}.csv`;
 a.click();
 URL.revokeObjectURL(url);
});
</script></body></html>
