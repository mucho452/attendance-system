<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>先生用管理画面</title></head><body>
<h1>出席一覧</h1>
<button id="csvBtn" disabled>CSVダウンロード</button>
<table border="1"><thead><tr><th>ID</th><th>名前</th><th>日時</th></tr></thead><tbody id="list"></tbody></table>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",authDomain:"attendance-system-4194f.firebaseapp.com",projectId:"attendance-system-4194f",storageBucket:"attendance-system-4194f.firebasestorage.app",messagingSenderId:"775610185044",appId:"1:775610185044:web:e2b101da1258dc5b4ac4c1"};
const app=initializeApp(firebaseConfig); const db=getFirestore(app);
const snap=await getDocs(query(collection(db,'attendances'),orderBy('timestamp','desc')));
const tb=document.getElementById('list');
const rows=[];
snap.forEach(d=>{
 const x=d.data();
 const timeStr=x.timestamp?.toDate ? x.timestamp.toDate().toLocaleString() : '';
 rows.push({id:x.studentId||'',name:x.studentName||'',time:timeStr});
 tb.innerHTML += `<tr><td>${x.studentId||''}</td><td>${x.studentName||''}</td><td>${timeStr}</td></tr>`;
});
document.getElementById('csvBtn').disabled=false;
document.getElementById('csvBtn').addEventListener('click',()=>{
 let csv='\uFEFFID,名前,日時\n';
 rows.forEach(r=>{
  csv+=[r.id,r.name,r.time].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')+'\n';
 });
 const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
 const url=URL.createObjectURL(blob);
 const a=document.createElement('a');
 a.href=url; a.download=`出席データ_${new Date().toISOString().split('T')[0]}.csv`; a.click();
 URL.revokeObjectURL(url);
});
</script></body></html>
