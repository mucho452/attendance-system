<script type="module">
  // Firebaseの機能をインポート
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app-js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // あなたのFirebase設定情報を反映しました
  const firebaseConfig = {
    apiKey: "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
    authDomain: "attendance-system-4194f.firebaseapp.com",
    projectId: "attendance-system-4194f",
    storageBucket: "attendance-system-4194f.firebasestorage.app",
    messagingSenderId: "775610185044",
    appId: "1:775610185044:web:e2b101da1258dc5b4ac4c1",
    measurementId: "G-4Y27410MKM"
  };

  // Firebaseの初期化
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 登録ボタンが押されたときの処理
  document.getElementById('registerForm').addEventListener('submit', async function(event) {
    event.preventDefault();

    const studentId = document.getElementById('studentId').value;
    const studentName = document.getElementById('studentName').value;

    try {
      // 1. すでに同じ学籍番号が登録されていないかデータベースをチェック
      const userRef = doc(db, "users", studentId);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        alert("この学籍番号はすでに登録されています。ログインしてください。");
        return;
      }

      // 2. データベース（usersコレクション）に新規保存
      await setDoc(doc(db, "users", studentId), {
        name: studentName,
        createdAt: new Date()
      });

      // 3. ブラウザのメモ帳（LocalStorage）にも保存してログイン状態にする
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('studentId', studentId);
      localStorage.setItem('studentName', studentName);

      alert('会員登録が完了しました！出席画面へ移動します。');
      location.href = 'attendance.html';

    } catch (error) {
      console.error("エラーが発生しました: ", error);
      alert("登録に失敗しました。もう一度お試しください。");
    }
  });
</script>
