<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員登録</title>
    <style>
        body { font-family: sans-serif; padding: 30px 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; margin-bottom: 20px; text-align: center; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-submit { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .link-back { display: block; text-align: center; margin-top: 20px; color: #7f8c8d; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>新規 会員登録</h1>
    
    <form id="registerForm">
        <label for="studentId">学籍番号</label>
        <input type="text" id="studentId" placeholder="例: 2026A123" required>

        <label for="studentName">お名前</label>
        <input type="text" id="studentName" placeholder="例: 山田太郎" required>

        <button type="submit" class="btn-submit">登録して出席画面へ</button>
    </form>

    <a href="./index.html" class="link-back">◀ トップに戻る</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
    authDomain: "attendance-system-4194f.firebaseapp.com",
    projectId: "attendance-system-4194f",
    storageBucket: "attendance-system-4194f.firebasestorage.app",
    messagingSenderId: "775610185044",
    appId: "1:775610185044:web:e2b101da1258dc5b4ac4c1",
    measurementId: "G-4Y27410MKM"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  document.getElementById('registerForm').addEventListener('submit', async function(event) {
    event.preventDefault();

    const studentId = document.getElementById('studentId').value;
    const studentName = document.getElementById('studentName').value;

    try {
      const userRef = doc(db, "users", studentId);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        alert("この学籍番号はすでに登録されています。ログインしてください。");
        return;
      }

      await setDoc(doc(db, "users", studentId), {
        name: studentName,
        createdAt: new Date()
      });

      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('studentId', studentId);
      localStorage.setItem('studentName', studentName);

      alert('会員登録が完了しました！出席画面へ移動します。');
      // 移動命令をより確実な方法に修正
      window.location.href = './attendance.html';

    } catch (error) {
      console.error("エラーが発生しました: ", error);
      alert("登録に失敗しました。もう一度お試しください。");
    }
  });
</script>

</body>
</html>
