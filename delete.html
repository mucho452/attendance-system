<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アカウント削除</title>
<style>
    body { font-family: sans-serif; padding: 30px; background:#f4f7f6; }
    .container { max-width:400px; margin:0 auto; background:white; padding:25px; border-radius:10px; }
    input { width:100%; padding:12px; margin-bottom:20px; }
    button { width:100%; padding:12px; background:#e74c3c; color:white; border:none; border-radius:6px; }
</style>
</head>
<body>

<div class="container">
    <h1>アカウント削除</h1>
    <p>ID を入力してください</p>
    <input type="text" id="deleteId" placeholder="例: 2026A123">
    <button id="deleteBtn">削除する</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
  authDomain: "attendance-system-4194f.firebaseapp.com",
  projectId: "attendance-system-4194f",
  storageBucket: "attendance-system-4194f.firebasestorage.app",
  messagingSenderId: "775610185044",
  appId: "1:775610185044:web:e2b101da1258dc5b4ac4c1",
  measurementId: "G-4Y27410MKM"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("deleteBtn").addEventListener("click", async () => {
    const id = document.getElementById("deleteId").value;

    if (!confirm("本当に削除しますか？")) return;

    try {
        await deleteDoc(doc(db, "users", id));
        alert("削除しました。");
        window.location.href = "./index.html";
    } catch (e) {
        alert("削除に失敗しました。");
    }
});
</script>

</body>
</html>
