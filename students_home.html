<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生徒用ホームページ</title>
    <style>
        /* スマホ対応とサイズ計算のリセット */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body { 
            font-family: sans-serif; 
            padding: 30px 20px; 
            background-color: #f4f7f6; 
            color: #333; 
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        /* プロフィールカード */
        .profile-card { 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .profile-info h2 { 
            font-size: 20px; 
            color: #2c3e50; 
        }
        .profile-info p { 
            font-size: 14px; 
            color: #7f8c8d; 
            margin-top: 5px; 
        }
        .btn-logout { 
            padding: 8px 14px; 
            background-color: #e74c3c; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 14px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        
        /* タイトルとCSVボタンの配置用 */
        .title-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .title-section h1 { 
            font-size: 22px; 
            color: #2c3e50; 
        }
        
        /* CSVダウンロードボタンのスタイル */
        .btn-csv {
            padding: 8px 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-csv:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .no-data { 
            text-align: center; 
            padding: 40px 20px; 
            background: white; 
            border-radius: 10px; 
            color: #7f8c8d; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        /* 教科ごとのカード */
        .subject-card { 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 15px; 
        }
        .subject-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #f4f7f6; 
            padding-bottom: 10px; 
            margin-bottom: 10px; 
        }
        .subject-title { 
            font-size: 18px; 
            font-weight: bold; 
            color: #3498db; 
        }
        .subject-summary { 
            font-size: 14px; 
            font-weight: bold; 
            color: #2c3e50; 
        }
        .status-present-count { color: #2ecc71; margin-right: 10px; }
        .status-late-count { color: #f39c12; }
        
        /* 履歴リスト */
        .history-list { list-style: none; }
        .history-item { 
            display: flex; 
            justify-content: space-between; 
            font-size: 14px; 
            padding: 8px 0; 
            color: #555; 
            border-bottom: 1px dashed #eee;
        }
        .history-item:last-child { border-bottom: none; }
        .badge { 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 12px; 
            font-weight: bold; 
            color: white; 
        }
        .badge-present { background-color: #2ecc71; }
        .badge-late { background-color: #f39c12; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-card">
        <div class="profile-info">
            <h2 id="displayName">読み込み中...</h2>
            <p>学籍番号: <span id="displayId">-</span></p>
        </div>
        <button class="btn-logout" id="logoutBtn">ログアウト</button>
    </div>

    <div class="title-section">
        <h1>教科別の出席状況</h1>
        <button class="btn-csv" id="csvBtn" disabled>CSV出力</button>
    </div>
    
    <div id="subjectContainer">
        <div class="no-data">出席状況を読み込んでいます...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collectionGroup, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Firebaseの設定
    const firebaseConfig = {
        apiKey: "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
        authDomain: "attendance-system-4194f.firebaseapp.com",
        projectId: "attendance-system-4194f",
        storageBucket: "attendance-system-4194f.firebasestorage.app",
        messagingSenderId: "775610185044",
        appId: "1:775610185044:web:e2b101da1258dc5b4ac4c1",
        measurementId: "G-4Y27410MKM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // CSV出力用に、取得したデータをまるごと保存しておくための配列
    let allRecordsForCsv = [];

    async function loadStudentHome() {
        const studentId = localStorage.getItem('studentId');
        const studentName = localStorage.getItem('studentName');
        
        // ログイン情報がなければログイン画面へ強制送還
        if (!studentId) {
            window.location.href = './login.html';
            return;
        }
        
        document.getElementById('displayId').innerText = studentId;
        document.getElementById('displayName').innerText = studentName + " さん";
        
        const container = document.getElementById('subjectContainer');
        
        try {
            // すべての授業の 'students' サブコレクションから自分の学籍番号のデータを一斉に取得
            const q = query(collectionGroup(db, 'students'), where('studentId', '==', studentId));
            const snap = await getDocs(q);
            
            if (snap.empty) {
                container.innerHTML = `<div class="no-data">出席履歴がまだありません。</div>`;
                return;
            }
            
            // データを教科ごとにグループ化するためのオブジェクト
            const attendanceBySubject = {};
            
            // 配列を一度リセットしてからデータを詰め込むよ
            allRecordsForCsv = [];
            
            snap.forEach(docSnap => {
                const data = docSnap.data();
                const subject = data.subject || "不明な教科";
                
                // CSV出力用の配列にもデータを追加しておく
                allRecordsForCsv.push(data);
                
                if (!attendanceBySubject[subject]) {
                    attendanceBySubject[subject] = [];
                }
                attendanceBySubject[subject].push(data);
            });
            
            // データが読み込めたので、CSVボタンをクリックできるようにするよ
            if (allRecordsForCsv.length > 0) {
                document.getElementById('csvBtn').disabled = false;
            }
            
            let html = '';
            
            // 教科ごとにカードを組み立てる
            for (const subject in attendanceBySubject) {
                const records = attendanceBySubject[subject];
                
                // 日付が新しい順（降順）にソート
                records.sort((a, b) => (b.timestamp?.toDate() || 0) - (a.timestamp?.toDate() || 0));
                
                let presentCount = 0;
                let lateCount = 0;
                let listHtml = '';
                
                records.forEach(rec => {
                    const status = rec.status || "出席";
                    if (status === "遅刻") lateCount++;
                    else presentCount++;
                    
                    const time = rec.timestamp?.toDate();
                    const timeStr = time 
                        ? `${time.getFullYear()}/${String(time.getMonth()+1).padStart(2,'0')}/${String(time.getDate()).padStart(2,'0')} ${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`
                        : "日時なし";
                        
                    const badgeClass = status === "遅刻" ? "badge-late" : "badge-present";
                    const mark = status === "遅刻" ? "遅刻 (△)" : "出席 (〇)";
                    
                    listHtml += `
                        <li class="history-item">
                            <span class="badge ${badgeClass}">${mark}</span>
                            <span>${timeStr}</span>
                        </li>
                    `;
                });
                
                html += `
                    <div class="subject-card">
                        <div class="subject-header">
                            <span class="subject-title">${escHtml(subject)}</span>
                            <span class="subject-summary">
                                <span class="status-present-count">出席: ${presentCount}回</span>
                                <span class="status-late-count">遅刻: ${lateCount}回</span>
                            </span>
                        </div>
                        <ul class="history-list">
                            ${listHtml}
                        </ul>
                    </div>
                `;
            }
            
            container.innerHTML = html;
            
        } catch (e) {
            console.error(e);
            container.innerHTML = `<div class="no-data">データの読み込みに失敗しました: ${e.message}</div>`;
        }
    }

    // 安全に文字を出力するための関数
    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // CSVダウンロードボタンのクリックイベント処理
    document.getElementById('csvBtn').addEventListener('click', () => {
        if (allRecordsForCsv.length === 0) return;

        // 全データを日付の新しい順（降順）に並び替える
        allRecordsForCsv.sort((a, b) => (b.timestamp?.toDate() || 0) - (a.timestamp?.toDate() || 0));

        // CSVのヘッダー（見出し行）を作成
        let csvContent = '教科,状態,出席日時\n';

        // データを1行ずつCSV形式の文字列にしていくよ
        allRecordsForCsv.forEach(rec => {
            const subject = rec.subject || '不明な教科';
            const status = rec.status || '出席';
            const time = rec.timestamp?.toDate();
            const timeStr = time 
                ? `${time.getFullYear()}/${String(time.getMonth()+1).padStart(2,'0')}/${String(time.getDate()).padStart(2,'0')} ${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`
                : '日時なし';

            // 教科名などにカンマが入っていてもCSVが崩れないようにダブルクォーテーションで囲む
            csvContent += `"${subject.replace(/"/g, '""')}","${status}","${timeStr}"\n`;
        });

        // ファイル名を作る（例: attendance_2026A123.csv）
        const studentId = localStorage.getItem('studentId') || 'student';
        const filename = `attendance_${studentId}.csv`;

        // Excelで開いたときの文字化けを防ぐおまじない（BOM: \uFEFF）を最初につけてBlobを作るよ
        const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url); // 使い終わったURLを解放
    });

    // ログアウト処理
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.clear();
        alert('ログアウトしました。');
        window.location.href = './login.html';
    });

    // 画面起動時に実行
    loadStudentHome();
</script>

</body>
</html>
