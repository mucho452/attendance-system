<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出席管理システム - ログイン</title>

    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background-color: #f4f7f6; 
            color: #333; 
        }
        .container { 
            max-width: 400px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        h1 { 
            font-size: 26px; 
            margin-bottom: 10px; 
            color: #2c3e50; 
        }
        #subjectName {
            font-size: 18px;
            margin-bottom: 25px;
            color: #3182ce;
            font-weight: bold;
        }

        .pass-section { 
            margin-bottom: 30px; 
            padding: 15px; 
            background: #edf2f7; 
            border-radius: 8px; 
        }
        label { 
            font-weight: bold; 
            display: block; 
            margin-bottom: 8px; 
            font-size: 14px; 
            color: #4a5568; 
        }
        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #cbd5e0; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px; 
            text-align: center; 
        }
        input[type="text"]:focus { 
            border-color: #3182ce; 
            outline: none; 
        }

        .btn-group { 
            display: none; 
            margin-top: 20px;
        }
        .btn { 
            display: block; 
            width: 100%; 
            max-width: 300px; 
            margin: 15px auto; 
            padding: 15px; 
            font-size: 18px; 
            font-weight: bold; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            text-decoration: none; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: 0.2s; 
        }
        .btn-register { background-color: #2ecc71; }
        .btn-login { background-color: #3498db; }
        .btn-delete { background-color: #e74c3c; }

        .btn:hover { 
            opacity: 0.9; 
            transform: translateY(-2px); 
        }

        .error-msg { 
            color: #e53e3e; 
            font-size: 14px; 
            margin-top: 5px; 
            display: none; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>出席確認システム</h1>

    <!-- Firestoreから授業名を表示 -->
    <div id="subjectName">授業名を読み込み中…</div>
    
    <div class="pass-section">
        <label for="keywordInput">学校の指定キーワードを入力してください</label>
        <input type="text" id="keywordInput" placeholder="キーワードを入力">
        <p id="errorMsg" class="error-msg">キーワードが違います</p>
    </div>

    <div id="btnGroup" class="btn-group"></div>
</div>

<script type="module">
    /* Firebase 読み込み */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
        authDomain: "attendance-system-4194f.firebaseapp.com",
        projectId: "attendance-system-4194f",
        storageBucket: "attendance-system-4194f.firebasestorage.app",
        messagingSenderId: "775610185044",
        appId: "1:775610185044:web:e2b101da1258dc5b4ac4c1"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    /* URLから classId を取得 */
    const params = new URLSearchParams(location.search);
    const classId = params.get('classId');

    /* 授業名を読み込む */
    async function loadClass() {
        const subjectName = document.getElementById('subjectName');

        if (!classId) {
            subjectName.innerText = "授業IDがありません";
            return;
        }

        const snap = await getDoc(doc(db, 'attendance', classId));
        if (!snap.exists()) {
            subjectName.innerText = "授業が見つかりません";
            return;
        }

        const cls = snap.data();
        subjectName.innerText = cls.subject || "授業名なし";
    }

    loadClass();

    /* キーワード認証 */
    const keywordInput = document.getElementById('keywordInput');
    const btnGroup = document.getElementById('btnGroup');
    const errorMsg = document.getElementById('errorMsg');

    keywordInput.addEventListener('input', function() {
        const value = keywordInput.value.trim();

        if (value === 'anankosen') {
            errorMsg.style.display = 'none';
            keywordInput.style.borderColor = '#2ecc71';
            keywordInput.disabled = true;

            /* classId を引き継いだリンクを生成 */
            btnGroup.innerHTML = `
                <p>操作を選択してください</p>
                <a href="register.html?classId=${classId}" class="btn btn-register">会員登録</a>
                <a href="login.html?classId=${classId}" class="btn btn-login">ログイン</a>
                <a href="delete.html?classId=${classId}" class="btn btn-delete">アカウント削除</a>
            `;
            btnGroup.style.display = 'block';

        } else if (value.length >= 9) {
            errorMsg.style.display = 'block';
            btnGroup.style.display = 'none';
        } else {
            errorMsg.style.display = 'none';
            btnGroup.style.display = 'none';
        }
    });
</script>

</body>
</html>
