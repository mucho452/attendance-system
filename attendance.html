<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出席登録</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 32px; color: #e74c3c; margin-bottom: 10px; }
        p { font-size: 16px; color: #7f8c8d; }
        
        .welcome-msg { font-size: 18px; font-weight: bold; margin-bottom: 25px; color: #2c3e50; padding: 15px; background: #eef2f7; border-radius: 6px; line-height: 1.5; }
        .welcome-msg span { display: block; font-size: 14px; color: #7f8c8d; font-weight: normal; margin-top: 5px; }

        .select-group { text-align: left; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #34495e; }

        .subject-box {
            width: 100%;
            padding: 12px;
            background: #f9fafb;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 16px;
            text-align: left;
        }

        .status-group { display: flex; gap: 20px; margin-top: 10px; }
        .status-label { display: flex; align-items: center; font-weight: normal; cursor: pointer; font-size: 16px; }
        .status-label input { margin-right: 6px; transform: scale(1.2); }

        .btn-submit { width: 100%; padding: 14px; background-color: #e74c3c; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        .btn-submit:hover { background-color: #c0392b; }
        .btn-submit:disabled { background-color: #bdc3c7; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div id="welcomeBox" class="welcome-msg">読み込み中...</div>

    <h1>出席登録</h1>
    <p>授業名と出席状況を確認して送信してください。</p>
    
    <!-- 授業名（自動判別） -->
    <div class="select-group">
        <label>教科名</label>
        <div id="subjectName" class="subject-box">読み込み中...</div>
    </div>

    <!-- 出席状況 -->
    <div class="select-group">
        <label>出席状況</label>
        <div class="status-group">
            <label class="status-label">
                <input type="radio" name="attendanceStatus" value="出席" checked> 出席 (〇)
            </label>
            <label class="status-label">
                <input type="radio" name="attendanceStatus" value="遅刻"> 遅刻 (△)
            </label>
        </div>
    </div>

    <button id="attendanceBtn" class="btn-submit">出席を送信する</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
        authDomain: "attendance-system-4194f.firebaseapp.com",
        projectId: "attendance-system-4194f",
        storageBucket: "attendance-system-4194f.firebasestorage.app",
        messagingSenderId: "775610185044",
        appId: "1:775610185044:web:e2b101da1258dc5b4ac4c1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    /* ログイン情報チェック */
    const studentId = localStorage.getItem('studentId');
    const studentName = localStorage.getItem('studentName');
    const welcomeBox = document.getElementById('welcomeBox');

    if (!studentId || !studentName) {
        alert("ログイン情報が見つかりません。トップ画面からやり直してください。");
        window.location.href = './index.html';
    } else {
        welcomeBox.innerHTML = `出席確認 ${studentName} さん<span>学籍番号: ${studentId}</span>`;
    }

    /* URLから classId を取得 */
    const params = new URLSearchParams(location.search);
    const classId = params.get('classId');

    /* Firestore から授業名を取得 */
    async function loadClass() {
        if (!classId) {
            document.getElementById('subjectName').innerText = "授業IDがありません";
            return;
        }

        const snap = await getDoc(doc(db, 'attendance', classId));
        if (!snap.exists()) {
            document.getElementById('subjectName').innerText = "授業が見つかりません";
            return;
        }

        const cls = snap.data();
        document.getElementById('subjectName').innerText = cls.subject || "授業名なし";
    }

    loadClass();

    /* 出席送信処理 */
    document.getElementById('attendanceBtn').addEventListener('click', async function() {
        const subject = document.getElementById('subjectName').innerText;

        const statusEl = document.querySelector('input[name="attendanceStatus"]:checked');
        const currentStatus = statusEl ? statusEl.value : "出席";

        try {
            const btn = document.getElementById('attendanceBtn');
            btn.disabled = true;
            btn.innerText = "送信中...";

            await addDoc(collection(db, `attendance/${classId}/students`), {
                studentId: studentId,
                name: studentName,
                subject: subject,
                status: currentStatus,
                timestamp: serverTimestamp()
            });

            alert("出席登録が完了しました！");
            window.location.href = `./history.html?classId=${classId}`;

        } catch (error) {
            console.error("送信失敗:", error);
            alert("送信に失敗しました。もう一度試してください。");
            const btn = document.getElementById('attendanceBtn');
            btn.disabled = false;
            btn.innerText = "出席を送信する";
        }
    });
</script>

</body>
</html>
