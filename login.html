<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // mucho452さんのFirebase設定情報
  const firebaseConfig = {
    apiKey: "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
    authDomain: "attendance-system-4194f.firebaseapp.com",
    projectId: "attendance-system-4194f",
    storageBucket: "attendance-system-4194f.firebasestorage.app",
    messagingSenderId: "775610185044",
    appId: "1:775610185044:web:e2b101da1258dc5b4ac4c1",
    measurementId: "G-4Y27410MKM"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ログインボタンが押されたときの処理
  document.getElementById('loginForm').addEventListener('submit', async function(event) {
    event.preventDefault();

    const loginId = document.getElementById('loginId').value;

    try {
      // データベースから学籍番号を検索
      const userRef = doc(db, "users", loginId);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        const userData = userSnap.data();
        
        // LocalStorageに保存
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('studentId', loginId);
        localStorage.setItem('studentName', userData.name); 

        alert(`ログインしました！こんにちは、${userData.name}さん。`);
        location.href = 'attendance.html';
      } else {
        alert("学籍番号が見つかりません。初めての方は会員登録をしてください。");
      }

    } catch (error) {
      console.error("エラーが発生しました: ", error);
      alert("ログインに失敗しました。");
    }
  });
</script>
